@if (avatarUrl()) {
  <img
    [src]="avatarUrl()"
    [alt]="profile().username"
    class="w-7 h-7 rounded-full object-cover shrink-0"
    (error)="$any($event.target).style.display='none'"
  />
} @else {
  <div
    class="w-7 h-7 rounded-full flex items-center justify-center shrink-0 text-xs font-semibold"
    style="background: var(--p-surface-600); color: var(--p-surface-0)"
  >
    {{ initials() }}
  </div>
}

<div class="flex flex-col min-w-0">
  <span class="text-xs font-medium leading-tight truncate hover:underline" style="color: var(--p-surface-50)">
    {{ profile().username }}
  </span>
  @if (fullName()) {
    <span class="text-xs leading-tight truncate" style="color: var(--p-surface-400); font-size: 0.7rem">
      {{ fullName() }}
    </span>
  }
</div>
