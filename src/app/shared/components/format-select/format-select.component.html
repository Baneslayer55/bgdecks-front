<p-select
  [options]="options()"
  [ngModel]="value()"
  (ngModelChange)="onNgModelChange($event)"
  optionLabel="name"
  optionValue="id"
  [placeholder]="placeholder()"
  appendTo="body"
  styleClass="text-sm w-full"
>
  <ng-template #item let-fmt>
    <div class="flex flex-col py-0.5">
      <span class="text-sm" style="color: var(--p-surface-50)">{{ fmt.name }}</span>
      @if (fmt.description) {
        <span class="text-xs" style="color: var(--p-surface-400)">{{ fmt.description }}</span>
      }
    </div>
  </ng-template>
</p-select>
