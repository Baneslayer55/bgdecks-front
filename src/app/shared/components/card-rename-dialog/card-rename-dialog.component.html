<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  header="Переименование карты"
  [modal]="true"
  [draggable]="false"
  [style]="{ width: '400px' }"
  appendTo="body"
  (onShow)="onShow()"
>
  <div class="flex flex-col gap-4 py-2">
    <div class="flex flex-col gap-1">
      <label class="text-xs" style="color: var(--p-surface-400)">Текущее имя</label>
      <input pInputText [value]="card().name" [disabled]="true" class="w-full" />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-xs" style="color: var(--p-surface-400)">Новое имя</label>
      <input pInputText [(ngModel)]="newName" class="w-full" placeholder="Новое название карты" />
    </div>
  </div>
  <ng-template #footer>
    <p-button label="Отмена" severity="secondary" [outlined]="true" [disabled]="saving()" (onClick)="visibleChange.emit(false)" />
    <p-button label="Переименовать" [loading]="saving()" [disabled]="!newName.trim()" (onClick)="save()" />
  </ng-template>
</p-dialog>
