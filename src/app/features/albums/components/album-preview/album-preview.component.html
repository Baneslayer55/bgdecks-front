<div
  class="flex flex-col gap-3 rounded-lg border transition-colors cursor-pointer w-full p-3 hover:border-opacity-80"
  style="background: var(--p-surface-900); border-color: var(--p-surface-700)"
  (click)="navigate()"
>
  <div class="flex items-start justify-between gap-2">
    <div class="flex items-center gap-2 min-w-0">
      <span
        class="font-semibold text-base leading-tight truncate"
        style="color: var(--p-surface-0)"
      >{{ album().name }}</span>

      @if (isOwner() && isOutdated()) {
        <p-button
          icon="pi pi-arrow-up"
          label="Актуально"
          [loading]="upping()"
          (onClick)="upAlbum($event)"
          styleClass="shrink-0"
          [style]="{ padding: '2px 8px', 'font-size': '0.7rem' }"
        />
      }
    </div>

    @if (!album().isPublic) {
      <i class="pi pi-lock text-xs shrink-0 mt-0.5" style="color: var(--p-surface-500)"></i>
    }
  </div>

  <div class="flex flex-wrap gap-2">
    <span
      class="text-xs px-2 py-0.5 rounded-full"
      style="background: var(--p-surface-700); color: var(--p-surface-200)"
    >{{ typeLabel() }}</span>

    <span class="text-xs flex items-center gap-1" style="color: var(--p-surface-400)">
      <i class="pi pi-clone text-xs"></i>
      {{ album().cardsCount }}
    </span>
  </div>

  <span class="text-xs" style="color: var(--p-surface-200)">
    Актуально на: {{ album().updated ? (album().updated | date:'dd.MM.yyyy HH:mm') : 'никогда' }}
  </span>

  <div class="flex items-center gap-2 pt-1 border-t" style="border-color: var(--p-surface-800)">
    <app-user-profile-compact [profile]="album().owner" />
  </div>
</div>
