<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Создать альбом"
  [modal]="true"
  [style]="{ width: '440px' }"
  [draggable]="false"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4 pt-2">

    <div class="flex flex-col gap-1">
      <label class="text-sm" style="color: var(--p-surface-200)">Название</label>
      <input
        pInputText
        formControlName="name"
        placeholder="Введите название..."
        maxlength="32"
        class="w-full text-sm"
        [class.ng-invalid]="nameCtrl.invalid && nameCtrl.touched"
      />
      <div class="flex justify-between items-start">
        <span class="text-xs" style="color: var(--p-red-400)">
          @if (nameCtrl.touched && nameCtrl.hasError('required')) {
            Обязательное поле
          } @else if (nameCtrl.touched && nameCtrl.hasError('minlength')) {
            Минимум 3 символа
          }
        </span>
        <span class="text-xs shrink-0"
              [style.color]="nameCtrl.value.length > 32 ? 'var(--p-red-400)' : 'var(--p-surface-400)'">
          {{ nameCtrl.value.length }}/32
        </span>
      </div>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm" style="color: var(--p-surface-200)">Описание</label>
      <textarea
        pTextarea
        formControlName="description"
        placeholder="Описание альбома..."
        maxlength="256"
        rows="3"
        class="w-full text-sm resize-none"
      ></textarea>
      <span class="text-xs self-end"
            [style.color]="descCtrl.value.length > 256 ? 'var(--p-red-400)' : 'var(--p-surface-400)'">
        {{ descCtrl.value.length }}/256
      </span>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm" style="color: var(--p-surface-200)">Тип</label>
      <p-select
        formControlName="type"
        [options]="typeOptions"
        optionLabel="label"
        optionValue="value"
        class="w-full"
      />
    </div>

    <div class="flex items-center gap-2">
      <p-checkbox formControlName="isPublic" [binary]="true" inputId="isPublic" />
      <label for="isPublic" class="text-sm cursor-pointer" style="color: var(--p-surface-200)">
        Публичный альбом
      </label>
    </div>

  </form>

  <ng-template #footer>
    <p-button label="Отмена" severity="secondary" [outlined]="true" (onClick)="close()" />
    <p-button label="Создать" [disabled]="form.invalid" (onClick)="submit()" />
  </ng-template>
</p-dialog>
