<div class="flex min-h-screen">

  <!-- ── Decks ──────────────────────────────────────────────────────────────── -->
  <main #mainContainer class="flex flex-col gap-4 p-4 flex-1 min-w-0">

    @if (loading()) {
      <div class="flex justify-center py-20">
        <p-progress-spinner />
      </div>
    } @else {
      <div class="grid gap-6" [style.grid-template-columns]="'repeat(auto-fill, minmax(320px, 1fr))'">
        <app-create-deck-placeholder (clicked)="createDialogVisible.set(true)" />
        <div
          class="flex flex-col items-center justify-center rounded-lg border transition-colors w-full h-full"
          [class.cursor-pointer]="!migrating()"
          [class.opacity-60]="migrating()"
          style="background: var(--p-surface-900); border-color: var(--p-surface-600); border-style: dashed; min-height: 80px"
          (click)="migrateDecks()"
        >
          <i
            class="pi text-3xl"
            [class.pi-sync]="!migrating()"
            [class.pi-spin]="migrating()"
            [class.pi-spinner]="migrating()"
            style="color: var(--p-surface-400)"
          ></i>
          <span class="text-sm font-medium mt-2 text-center px-2" style="color: var(--p-surface-300)">
            Синхронизировать колоды с berserkdeck.ru
          </span>
        </div>
        @for (deck of decks(); track deck.id) {
          <app-deck-card [deck]="deck" (deleted)="search()" />
        }
      </div>

      @if (totalElements() > pageSize()) {
        <div class="flex justify-center">
          <p-paginator
            [rows]="pageSize()"
            [totalRecords]="totalElements()"
            [first]="page() * pageSize()"
            (onPageChange)="onPageChange($event)"
            styleClass="w-fit"
          />
        </div>
      }
    }

  </main>

  <!-- ── Filter drawer ─────────────────────────────────────────────────────── -->

  @if (isMobile()) {
    <!-- Mobile: fixed overlay, tab + panel slide together -->
    <div
      class="fixed right-0 top-14 h-[calc(100vh-3.5rem)] z-40 flex transition-transform duration-300"
      [class.translate-x-80]="!filtersOpen()"
    >
      <div class="flex items-center">
        <ng-container *ngTemplateOutlet="tabBtn" />
      </div>
      <ng-container *ngTemplateOutlet="filterPanel" />
    </div>
  } @else {
    <!-- Desktop: in-flow, tab always visible, panel pushes content -->
    <div class="flex shrink-0 sticky top-0 h-screen">
      <div class="flex items-center">
        <ng-container *ngTemplateOutlet="tabBtn" />
      </div>
      <div class="overflow-hidden transition-[width] duration-300"
           [class.w-0]="!filtersOpen()" [class.w-80]="filtersOpen()">
        <ng-container *ngTemplateOutlet="filterPanel" />
      </div>
    </div>
  }

</div>

<app-create-deck-dialog
  [visible]="createDialogVisible()"
  (visibleChange)="createDialogVisible.set($event)"
  (created)="onDeckCreated($event)"
/>

<!-- ── Templates ──────────────────────────────────────────────────────────── -->

<ng-template #tabBtn>
  <button
    type="button"
    class="w-8 h-8 flex items-center justify-center rounded-l-md border-l border-t border-b cursor-pointer"
    style="background: var(--p-surface-800); border-color: var(--p-surface-700)"
    (click)="toggleFilters()"
  >
    <i class="pi pi-filter" style="color: white; font-size: 14px"></i>
  </button>
</ng-template>

<ng-template #filterPanel>
  <aside
    class="w-80 h-full flex flex-col p-4 overflow-y-auto border-l"
    style="background: var(--p-surface-950); border-color: var(--p-surface-700)"
  >
    <div class="flex flex-col gap-4">

      <!-- Стихии героя -->
      <div>
        <p class="text-xs mb-2" style="color: var(--p-surface-400)">Стихия героя</p>
        <app-hero-elements-filter [(selected)]="heroElements" (selectedChange)="onFilterChange()" />
      </div>

      <hr style="border-color: var(--p-surface-700)" />

      <!-- Автокомплиты -->
      <div class="flex flex-col gap-3">
        <app-card-autocomplete
          searchMode="HEROES"
          placeholder="Герой"
          [resetTrigger]="resetTrigger()"
          (cardSelected)="onHeroSelected($event)"
        />
        <app-card-autocomplete
          searchMode="NON_HEROES"
          placeholder="Карта в колоде"
          [resetTrigger]="resetTrigger()"
          (cardSelected)="onDeckCardSelected($event)"
        />
      </div>

      <!-- Формат -->
      <app-format-select
        [(value)]="formatId"
        [showNullOption]="true"
        (valueChange)="onFilterChange()"
      />

      <hr style="border-color: var(--p-surface-700)" />

      <!-- Сброс -->
      <div class="flex justify-center">
        <p-button label="Сброс" severity="secondary" [outlined]="true" (onClick)="reset()" />
      </div>

    </div>
  </aside>
</ng-template>
