<div
  class="flex rounded-lg border transition-colors w-full"
  style="background: var(--p-surface-900); border-color: var(--p-surface-700)"
>
  <!-- Hero image -->
  <a
    [routerLink]="['/decks', deck().id]"
    class="w-40 shrink-0 rounded-l-lg overflow-hidden block"
    style="aspect-ratio: 2/3"
  >
    <app-card-image [card]="deck().hero" [zoomable]="false" class="w-full" />
  </a>

  <!-- Deck info -->
  <div class="flex flex-col justify-between p-3 flex-1 min-w-0 overflow-hidden">
    <!-- Top: name, format, validity -->
    <div class="flex flex-col gap-1.5">
      <div class="flex items-start justify-between gap-1">
        <a
          [routerLink]="['/decks', deck().id]"
          class="font-semibold text-base leading-tight hover:underline no-underline"
          style="color: var(--p-surface-0)"
        >{{ deck().name }}</a>
        @if (isOwner()) {
          <button
            type="button"
            class="shrink-0 w-6 h-6 flex items-center justify-center rounded"
            style="color: var(--p-surface-400)"
            title="Удалить"
            (click)="onDeleteClick($event)"
          ><i class="pi pi-trash" style="font-size: 12px"></i></button>
        }
      </div>

      @if (deck().format) {
        <span class="text-xs" style="color: var(--p-surface-400)">{{ deck().format.name }}</span>
      }

      @if (deck().isValid) {
        <span class="self-start text-xs px-1.5 py-0.5 rounded-full" style="background: rgba(34,197,94,0.15); color: #4ade80">
          Валидна
        </span>
      } @else {
        <span class="self-start text-xs px-1.5 py-0.5 rounded-full" style="background: rgba(239,68,68,0.15); color: #f87171">
          Не валидна
        </span>
      }
    </div>

    <!-- Bottom: owner + stats -->
    <div class="flex flex-col gap-2">
      <app-user-profile-compact [profile]="deck().owner" />
      <app-deck-stats [deck]="deck()" />
    </div>
  </div>
</div>

<p-dialog
  [visible]="confirmVisible()"
  (visibleChange)="confirmVisible.set($event)"
  header="Удаление колоды"
  [modal]="true"
  [draggable]="false"
  [style]="{ width: '400px' }"
>
  <p class="text-sm py-2" style="color: var(--p-surface-200)">
    Вы точно хотите удалить колоду? Это действие нельзя будет отменить.
  </p>
  <ng-template #footer>
    <p-button
      label="Отмена"
      severity="secondary"
      [outlined]="true"
      [disabled]="deleting()"
      (onClick)="confirmVisible.set(false)"
    />
    <p-button
      label="Удалить"
      severity="danger"
      [loading]="deleting()"
      (onClick)="confirmDelete()"
    />
  </ng-template>
</p-dialog>
