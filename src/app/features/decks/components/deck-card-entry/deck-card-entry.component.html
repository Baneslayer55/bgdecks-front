<div class="relative rounded-xl overflow-hidden" style="aspect-ratio: 2/3">
  <img
    [src]="imageUrl()"
    [alt]="entry().card.name"
    class="w-full h-full object-cover"
    loading="lazy"
    (error)="$any($event.target).style.display='none'"
  />
  @if (entry().cardsCount > 1) {
    <span
      class="absolute top-1 left-1 text-xs font-bold px-1.5 py-0.5 rounded-full leading-none"
      style="background: rgba(0,0,0,0.75); color: #fff"
    >×{{ entry().cardsCount }}</span>
  }
</div>
