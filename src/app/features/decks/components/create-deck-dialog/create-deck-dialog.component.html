<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Создать колоду"
  [modal]="true"
  [style]="{ width: '420px' }"
  [draggable]="false"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4 pt-2">

    <!-- Deck name -->
    <div class="flex flex-col gap-1">
      <label class="text-sm" style="color: var(--p-surface-200)">Название</label>
      <input
        pInputText
        formControlName="deckName"
        placeholder="Введите название..."
        maxlength="32"
        class="w-full text-sm"
        [class.ng-invalid]="nameCtrl.invalid && nameCtrl.touched"
      />
      <div class="flex justify-between items-start">
        <span class="text-xs" style="color: var(--p-red-400)">
          @if (nameCtrl.touched && nameCtrl.hasError('required')) {
            Обязательное поле
          } @else if (nameCtrl.touched && nameCtrl.hasError('minlength')) {
            Минимум 3 символа
          }
        </span>
        <span class="text-xs shrink-0" [style.color]="nameCtrl.value.length > 32 ? 'var(--p-red-400)' : 'var(--p-surface-400)'">
          {{ nameCtrl.value.length }}/32
        </span>
      </div>
    </div>

    <!-- Format -->
    <div class="flex flex-col gap-1">
      <label class="text-sm" style="color: var(--p-surface-200)">Формат</label>
      <app-format-select
        [value]="formatCtrl.value"
        (valueChange)="formatCtrl.setValue($event)"
        placeholder="Выберите формат..."
      />
      @if (formatCtrl.touched && formatCtrl.hasError('required')) {
        <span class="text-xs" style="color: var(--p-red-400)">Выберите формат</span>
      }
    </div>

    <!-- Is public -->
    <div class="flex items-center gap-2">
      <p-checkbox formControlName="isPublic" [binary]="true" inputId="isPublic" />
      <label for="isPublic" class="text-sm cursor-pointer" style="color: var(--p-surface-200)">
        Публичная колода
      </label>
    </div>

  </form>

  <ng-template #footer>
    <p-button label="Отмена" severity="secondary" [outlined]="true" (onClick)="close()" />
    <p-button label="Создать" [disabled]="form.invalid" (onClick)="submit()" />
  </ng-template>
</p-dialog>
