<!-- Download icon button -->
<div class="flex items-center gap-2">
  <button
    type="button"
    class="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded cursor-pointer"
    style="background: var(--p-surface-800); color: var(--p-surface-300)"
    title="Экспорт"
    [disabled]="exporting()"
    (click)="menu.toggle($event)"
  >
    @if (exporting()) {
      <p-progress-spinner styleClass="w-3 h-3" />
    } @else {
      <i class="pi pi-download" style="font-size: 11px"></i>
    }
    Экспорт
  </button>

  <p-menu #menu [popup]="true" [model]="menuItems" />
</div>

@if (exportError()) {
  <span class="text-xs" style="color: #f87171">{{ exportError() }}</span>
}

<!-- Background picker dialog -->
<p-dialog
  [visible]="bgDialogOpen()"
  (visibleChange)="bgDialogOpen.set($event)"
  header="Выберите фон"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="w-[480px]"
>
  <div class="grid grid-cols-3 gap-3 pt-1">
    @for (bg of backgrounds; track bg) {
      <button
        type="button"
        class="flex flex-col gap-1.5 rounded-lg overflow-hidden cursor-pointer border-2 transition-colors"
        [style.border-color]="hoveredBg() === bg ? 'var(--p-primary-500)' : 'transparent'"
        (mouseenter)="hoveredBg.set(bg)"
        (mouseleave)="hoveredBg.set(null)"
        (click)="exportWithBackground(bg)"
      >
        <img
          [src]="'/img/background/' + bg + '.png'"
          [alt]="bgLabels[bg]"
          class="w-full object-cover"
          style="height: 80px"
        />
        <span class="text-xs pb-1.5 text-center w-full" style="color: var(--p-surface-200)">
          {{ bgLabels[bg] }}
        </span>
      </button>
    }

    <!-- Custom background tile -->
    <button
      type="button"
      class="flex flex-col gap-1.5 rounded-lg overflow-hidden cursor-pointer border-2 transition-colors"
      [style.border-color]="hoveredBg() === 'custom' ? 'var(--p-primary-500)' : 'transparent'"
      (mouseenter)="hoveredBg.set('custom')"
      (mouseleave)="hoveredBg.set(null)"
      (click)="openCustomBgPicker()"
    >
      <div class="w-full flex flex-col items-center justify-center gap-1.5" style="height: 80px; background: var(--p-surface-800)">
        <i class="pi pi-upload" style="font-size: 20px; color: var(--p-surface-400)"></i>
      </div>
      <span class="text-xs pb-1.5 text-center w-full" style="color: var(--p-surface-200)">Своя картинка</span>
    </button>
  </div>

  <input #fileInput type="file" accept="image/*" class="hidden" (change)="onCustomBgFile($event)" />
</p-dialog>
