<div class="flex min-h-screen">

  <!-- ── Cards ──────────────────────────────────────────────────────────────── -->
  <main #mainContainer class="flex flex-col gap-4 p-4 flex-1 min-w-0">

    @if (loading()) {
      <div class="flex justify-center py-20">
        <p-progress-spinner />
      </div>
    } @else if (cards().length === 0) {
      <div class="flex flex-col items-center justify-center py-20 gap-2">
        <i class="pi pi-inbox text-4xl" style="color: var(--p-surface-400)"></i>
        <p class="text-sm" style="color: var(--p-surface-300)">Карты не найдены</p>
      </div>
    } @else {
      <div class="grid gap-3" [style.grid-template-columns]="'repeat(auto-fill, minmax(' + cardMinWidth() + 'px, 1fr))'">
        @for (card of cards(); track card.id) {
          <app-card-item [card]="card" />
        }
      </div>

      @if (totalElements() > pageSize()) {
        <div class="flex justify-center">
          <p-paginator
            [rows]="pageSize()"
            [totalRecords]="totalElements()"
            [first]="page() * pageSize()"
            (onPageChange)="onPageChange($event)"
            styleClass="w-fit"
          />
        </div>
      }
    }

  </main>

  <!-- ── Filter drawer ─────────────────────────────────────────────────────── -->

  @if (isMobile()) {
    <!-- Mobile: fixed overlay, tab + panel slide together -->
    <div
      class="fixed right-0 top-0 h-screen z-40 flex transition-transform duration-300"
      [class.translate-x-80]="!filtersOpen()"
    >
      <div class="flex items-center">
        <ng-container *ngTemplateOutlet="tabBtn" />
      </div>
      <ng-container *ngTemplateOutlet="filterPanel" />
    </div>
  } @else {
    <!-- Desktop: in-flow, tab always visible, panel pushes content -->
    <div class="flex shrink-0 sticky top-0 h-screen">
      <!-- Tab: outside overflow-hidden so it stays visible when panel is closed -->
      <div class="flex items-center">
        <ng-container *ngTemplateOutlet="tabBtn" />
      </div>
      <!-- Panel: collapses by shrinking width -->
      <div class="overflow-hidden transition-all duration-300"
           [class.w-0]="!filtersOpen()" [class.w-80]="filtersOpen()">
        <ng-container *ngTemplateOutlet="filterPanel" />
      </div>
    </div>
  }

</div>

<!-- ── Templates ──────────────────────────────────────────────────────────── -->

<ng-template #tabBtn>
  <button
    type="button"
    class="w-8 h-8 flex items-center justify-center rounded-l-md border-l border-t border-b cursor-pointer"
    style="background: var(--p-surface-800); border-color: var(--p-surface-700)"
    (click)="toggleFilters()"
  >
    <i class="pi pi-filter" style="color: white; font-size: 14px"></i>
  </button>
</ng-template>

<ng-template #filterPanel>
  <aside
    class="w-80 h-full flex flex-col p-4 overflow-y-auto border-l"
    style="background: var(--p-surface-950); border-color: var(--p-surface-700)"
  >
    <div class="flex flex-col gap-4">
      <!-- Image filters -->
      <div class="flex flex-col gap-3">
        <div class="flex gap-4 justify-center">
          <app-image-filter [options]="ELEMENTS" imageDir="/img/elements" [gridCols]="3"
                            [(selected)]="selectedElements" (selectedChange)="onFilterChange()" />
          <app-image-filter [options]="TYPES" imageDir="/img/types" [gridCols]="3"
                            [(selected)]="selectedTypes" (selectedChange)="onFilterChange()" />
        </div>
        <div class="flex justify-center">
          <app-image-filter [options]="RARITIES" imageDir="/img/rarities" [gridCols]="4"
                            [gapPx]="5" [(selected)]="selectedRarities" (selectedChange)="onFilterChange()" />
        </div>
      </div>
      <!-- Characteristics -->
      <div class="flex flex-col gap-3">
        <app-range-filter label="Стоимость" iconSrc="/img/texthelpers/coin.png"   [(value)]="costFilter"   (valueChange)="onFilterChange()" />
        <app-range-filter label="Атака"     iconSrc="/img/texthelpers/attack.png" [(value)]="attackFilter" (valueChange)="onFilterChange()" />
        <app-range-filter label="Здоровье"  iconSrc="/img/texthelpers/health.png" [(value)]="healthFilter" (valueChange)="onFilterChange()" />
      </div>
      <!-- Main selects -->
      <div class="flex flex-col gap-3">
        <input pInputText [(ngModel)]="nameModel" (ngModelChange)="onFilterChange()"
               placeholder="Название карты" class="text-sm w-full leading-none !py-1.5" />
        <p-select [options]="MULTI_ELEMENT_OPTIONS" [(ngModel)]="multiElementModel"
                  (ngModelChange)="onFilterChange()" optionLabel="label" optionValue="value"
                  styleClass="text-sm w-full" />
        <p-select [options]="FOIL_OPTIONS" [(ngModel)]="foilModel"
                  (ngModelChange)="onFilterChange()" optionLabel="label" optionValue="value"
                  styleClass="text-sm w-full" />
        <p-select [options]="PF_OPTIONS" [(ngModel)]="pfModel"
                  (ngModelChange)="onFilterChange()" optionLabel="label" optionValue="value"
                  styleClass="text-sm w-full" />
      </div>

      <hr style="border-color: var(--p-surface-700)" />

      <!-- Sets, artists, checkboxes -->
      <div class="flex flex-col gap-3">
        <p-multiselect [options]="sets()" [(ngModel)]="selectedSets"
                       (ngModelChange)="onFilterChange()" optionLabel="name"
                       placeholder="Выпуск" [filter]="true" filterPlaceholder="Поиск..."
                       styleClass="text-sm w-full" [maxSelectedLabels]="1"
                       selectedItemsLabel="{0} выбрано" />
        <p-multiselect [options]="artists()" [(ngModel)]="selectedArtists"
                       (ngModelChange)="onFilterChange()" optionLabel="name"
                       placeholder="Художник" [filter]="true" filterPlaceholder="Поиск..."
                       styleClass="text-sm w-full" [maxSelectedLabels]="1"
                       selectedItemsLabel="{0} выбрано" />
        <div class="flex flex-col gap-2">
          <div class="flex items-center gap-2">
            <p-checkbox [(ngModel)]="isStandard" (ngModelChange)="onFilterChange()"
                        [binary]="true" inputId="isStandard" />
            <label for="isStandard" class="text-sm cursor-pointer" style="color: var(--p-surface-50)">
              Выпуски стандарта
            </label>
          </div>
          <div class="flex items-center gap-2">
            <p-checkbox [(ngModel)]="latestVersionsOnly" (ngModelChange)="onFilterChange()"
                        [binary]="true" inputId="latestVersionsOnly" />
            <label for="latestVersionsOnly" class="text-sm cursor-pointer" style="color: var(--p-surface-50)">
              Последние версии карт
            </label>
          </div>
          <div class="flex items-center gap-2">
            <p-checkbox [(ngModel)]="noAbilities" (ngModelChange)="onFilterChange()"
                        [binary]="true" inputId="noAbilities" />
            <label for="noAbilities" class="text-sm cursor-pointer" style="color: var(--p-surface-50)">
              Без способностей
            </label>
          </div>
        </div>
      </div>

      <hr style="border-color: var(--p-surface-700)" />

      <!-- Text + classes + reset -->
      <div class="flex flex-col gap-3">
        <app-text-input [helpers]="TEXT_HELPERS" [(value)]="textModel"
                        (valueChange)="onFilterChange()" />
        <p-multiselect [options]="classes()" [(ngModel)]="selectedClasses"
                       (ngModelChange)="onFilterChange()" optionLabel="name"
                       placeholder="Класс" [filter]="true" filterPlaceholder="Поиск..."
                       styleClass="text-sm w-full" [maxSelectedLabels]="1"
                       selectedItemsLabel="{0} выбрано" />
        <div class="flex justify-center">
          <p-button label="Сброс" severity="secondary" [outlined]="true" (onClick)="reset()" />
        </div>
      </div>

    </div>
  </aside>
</ng-template>
